name: Gewaechshaus Analyse
on:
  push:
    paths:
      - 'images/greenhouse_*.jpg'
env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
permissions:
  contents: write  
jobs:
  gewaechshaus-analysieren:
    runs-on: ubuntu-latest
    
    steps:
    - name: Repository auschecken
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
        
    - name: Python einrichten
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Abhängigkeiten installieren
      run: |
        pip install requests pillow
        
    - name: Geänderte Dateien ermitteln
      id: geaenderte-dateien
      run: |
        NEUES_BILD=$(git diff --name-only HEAD~1 HEAD | grep 'images/greenhouse_.*\.jpg' | head -1)
        echo "neues_bild=$NEUES_BILD" >> $GITHUB_OUTPUT
        echo "Neues Bild gefunden: $NEUES_BILD"
        
    - name: Bild analysieren
      if: steps.geaenderte-dateien.outputs.neues_bild != ''
      run: |
        python analyze_greenhouse.py "${{ steps.geaenderte-dateien.outputs.neues_bild }}"
        
    - name: Analyseergebnisse committen
      if: steps.geaenderte-dateien.outputs.neues_bild != ''
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add analysis/
        git commit -m "Analyseergebnisse für ${{ steps.geaenderte-dateien.outputs.neues_bild }}" || exit 0
        git push
