name: Greenhouse Analysis

on:
  push:
    paths:
      - 'images/greenhouse_*.jpg'

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

permissions:
  contents: write  # Erlaubt das Schreiben von Dateien

jobs:
  analyze-greenhouse:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests pillow
        
    - name: Get changed files
      id: changed-files
      run: |
        NEW_IMAGE=$(git diff --name-only HEAD~1 HEAD | grep 'images/greenhouse_.*\.jpg' | head -1)
        echo "new_image=$NEW_IMAGE" >> $GITHUB_OUTPUT
        echo "Found new image: $NEW_IMAGE"
        
    - name: Analyze image
      if: steps.changed-files.outputs.new_image != ''
      run: |
        python analyze_greenhouse.py "${{ steps.changed-files.outputs.new_image }}"
        
    - name: Commit analysis results
      if: steps.changed-files.outputs.new_image != ''
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add analysis/
        git commit -m "Analysis results for ${{ steps.changed-files.outputs.new_image }}" || exit 0
        git push
